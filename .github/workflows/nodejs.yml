name: Automatic Production Deployment (CD)

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Run security scan simulated
        run: |
          echo "Running security scan..."
          echo "No critical vulnerabilities found"

  deploy-to-production-automatic:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production-auto

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Automatic deployment to Production
        run: |
          echo "========================================="
          echo "AUTOMATIC PRODUCTION DEPLOYMENT (CD)"
          echo "========================================="
          echo "Application version: $(git rev-parse --short HEAD)"
          echo "Deployment timestamp: $(date)"
          echo "This deployment happened AUTOMATICALLY without human approval!"
          echo "Production deployment successful!"
          echo "========================================="

      - name: Post-deployment notification simulated
        run: |
          echo "Sending deployment notification to team..."
          echo "Subject: [AUTO] New version $(git rev-parse --short HEAD) deployed to Production"
          echo "Status: SUCCESS"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nodejs-ci-example-:${{ github.sha }}
